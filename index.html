<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark332 hubs</title>

<style>
body {
  background: #0f0f0f;
  color: white;
  font-family: Arial;
  padding: 10px;
}

h1 {
  text-align: center;
  color: red;
}

p {
  text-align: center;
  color: rgb(0,255,200);
}

textarea {
  width: 100%;
  height: 300px;
  background: #1a1a1a;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 15px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.link a {
  color: #00ff00;
  word-break: break-all;
}
</style>
</head>

<body>

<h1>Dark332 hubs</h1>
<p>By Dark332 [version 1.0]</p>

<textarea id="code" placeholder="Cole seu HTML completo aqui"></textarea>

<button onclick="gerar()">Gerar Link</button>
<button onclick="limpar()">Limpar</button>

<div class="link" id="link"></div>

<script>
function gerar(){
  const code = document.getElementById("code").value;

  if(!code){
    alert("Cola um código!");
    return;
  }

  const encoded = btoa(unescape(encodeURIComponent(code)));

  const url = location.origin + location.pathname.replace("index.html","") + "view.html#" + encoded;

  document.getElementById("link").innerHTML =
    `<a href="${url}" target="_blank">${url}</a>`;
}

function limpar(){
  document.getElementById("code").value = "";
  document.getElementById("link").innerHTML = "";
}
</script>

</body>
</html>
